version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: mlb_predictor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/mlb_predictor
      ODDS_API_KEY: ${ODDS_API_KEY}
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  pgdata:
